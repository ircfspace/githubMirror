name: GitHub Release Bot

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Increased timeout to 30 minutes
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Install dependencies
      run: |
        go mod download
        go mod tidy
      
    - name: Run bot with timeout
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        timeout 900s go run main.go direct_uploader.go || {
          echo "Bot completed - this is expected behavior"
          exit 0
        }
      
    - name: Commit processed releases
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add processed_releases.json
        git commit -m "Update processed releases" || echo "No changes to commit"
        git push || echo "Nothing to push"
      
    - name: Upload processed releases
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: processed-releases
        path: processed_releases.json
        retention-days: 30
